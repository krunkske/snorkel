<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POI Claimer — {{ new_owner }}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:       #0b0d11;
    --surface:  #13161d;
    --border:   #1f2430;
    --accent:   #00e5a0;
    --accent2:  #005f42;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --ok:       #00e5a0;
    --radius:   6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    flex: 1;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-size: 13px; font-weight: 600; color: var(--text); }
  .stat-value.accent { color: var(--accent); }

  .btn {
    padding: 7px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover  { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .btn.primary:hover { background: #00ffb3; border-color: #00ffb3; color: #000; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 1fr;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* ── LEFT: POI GRID ── */
  .poi-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .poi-toolbar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .poi-toolbar input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    flex: 1;
    min-width: 140px;
  }
  .poi-toolbar input[type="text"]::placeholder { color: var(--muted); }
  .poi-toolbar input[type="text"]:focus { outline: 1px solid var(--accent); }

  .sel-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .sel-count span { color: var(--accent); font-weight: 700; }

  .poi-grid {
    overflow-y: auto;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    align-content: start;
  }

  .poi-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
    position: relative;
  }
  .poi-card:hover { border-color: var(--muted); background: rgba(255,255,255,0.02); }
  .poi-card.selected {
    border-color: var(--accent);
    background: rgba(0, 229, 160, 0.06);
  }
  .poi-card.selected::before {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
  }

  .poi-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    padding-right: 16px;
    margin-bottom: 4px;
  }
  .poi-owner {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .poi-owner.ours { color: var(--accent); }
  .poi-gemeente {
    font-size: 10px;
    color: var(--muted);
  }
  .poi-bar {
    font-size: 10px;
    margin-top: 4px;
    letter-spacing: -1px;
  }

  /* ── RIGHT: LOG PANEL ── */
  .log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .log-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .log-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .log-entries {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-entry {
    border-radius: var(--radius);
    padding: 8px 10px;
    border: 1px solid var(--border);
    font-size: 11px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .log-entry.ok     { border-color: var(--accent2); background: rgba(0,229,160,0.04); }
  .log-entry.warn   { border-color: #78350f;        background: rgba(245,158,11,0.04); }
  .log-entry.error  { border-color: #7f1d1d;        background: rgba(239,68,68,0.04); }

  .log-entry-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .log-poi   { font-weight: 600; color: var(--text); }
  .log-ts    { font-size: 10px; color: var(--muted); }
  .log-detail { color: var(--muted); font-size: 10px; }
  .log-detail .ok-text    { color: var(--ok); }
  .log-detail .warn-text  { color: var(--warn); }
  .log-detail .error-text { color: var(--danger); }

  .empty-log {
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    margin-top: 40px;
  }

  /* ── COUNTDOWN ── */
  #countdown {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── PULSE DOT ── */
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .pulse.inactive { background: var(--muted); animation: none; }
</style>
</head>
<body>

<header>
  <h1>◈ POI CLAIMER</h1>
  <div class="status-bar">
    <div class="stat">
      <span class="stat-label">Target</span>
      <span class="stat-value accent" id="stat-owner">{{ new_owner }}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Next claim</span>
      <span class="stat-value" id="countdown">--:--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Server time</span>
      <span class="stat-value" id="stat-time">--:--:--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Image mode</span>
      <span class="stat-value" id="stat-daytime">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Status</span>
      <span class="stat-value"><span class="pulse inactive" id="pulse-dot"></span> <span id="stat-status">idle</span></span>
    </div>
  </div>
  <button class="btn primary" onclick="claimNow()" id="claim-btn">▶ Claim now</button>
</header>

<div class="layout">
  <!-- POI LIST -->
  <div class="poi-panel">
    <div class="poi-toolbar">
      <input type="text" id="search" placeholder="Search POIs..." oninput="filterPOIs()">
      <button class="btn" onclick="selectFiltered(true)">Select all</button>
      <button class="btn danger" onclick="selectFiltered(false)">Deselect all</button>
      <span class="sel-count"><span id="sel-num">0</span> / {{ pois|length }} selected</span>
    </div>
    <div class="poi-grid" id="poi-grid">
      {% for poi in pois %}
      <div class="poi-card"
           data-key="{{ poi[1] }}"
           data-name="{{ poi[2]|lower }}"
           data-gemeente="{{ poi[5]|lower }}"
           data-owner="{{ poi[4] }}"
           onclick="togglePOI(this)">
        <div class="poi-name">{{ poi[2] }}</div>
        <div class="poi-owner {% if poi[4] == new_owner %}ours{% endif %}">{{ poi[4] }}</div>
        <div class="poi-gemeente">{{ poi[5] }}</div>
        <div class="poi-bar">{{ poi[7] }}</div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- LOG PANEL -->
  <div class="log-panel">
    <div class="log-header">
      <h2>Activity log</h2>
      <button class="btn" onclick="clearLog()" style="font-size:10px;padding:4px 10px;">Clear</button>
    </div>
    <div class="log-entries" id="log-entries">
      <p class="empty-log">No activity yet.<br>Select POIs and click "Claim now".</p>
    </div>
  </div>
</div>

<script>
  const NEW_OWNER  = {{ new_owner|tojson }};
  const INTERVAL_S = {{ interval }} * 60;

  let selectedKeys  = new Set();
  let nextClaimAt   = null;
  let countdownTimer = null;
  let logPollTimer   = null;
  let running        = false;

  // ── POI SELECTION ──────────────────────────────────────────────────────────

  function togglePOI(card) {
    const key = card.dataset.key;
    const sel = !card.classList.contains('selected');
    card.classList.toggle('selected', sel);
    sel ? selectedKeys.add(key) : selectedKeys.delete(key);
    updateSelCount();
    syncSelection(key, sel);
  }

  function syncSelection(key, sel) {
    fetch('/api/select', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key, selected: sel})
    });
  }

  function selectFiltered(sel) {
    const visible = [...document.querySelectorAll('.poi-card')]
      .filter(c => c.style.display !== 'none');
    const keys = visible.map(c => c.dataset.key);

    visible.forEach(c => {
      c.classList.toggle('selected', sel);
      sel ? selectedKeys.add(c.dataset.key) : selectedKeys.delete(c.dataset.key);
    });
    updateSelCount();

    fetch('/api/select_all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({keys, selected: sel})
    });
  }

  function updateSelCount() {
    document.getElementById('sel-num').textContent = selectedKeys.size;
  }

  // ── SEARCH / FILTER ────────────────────────────────────────────────────────

  function filterPOIs() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    document.querySelectorAll('.poi-card').forEach(c => {
      const match = !q || c.dataset.name.includes(q) || c.dataset.gemeente.includes(q);
      c.style.display = match ? '' : 'none';
    });
  }

  // ── CLAIM NOW ──────────────────────────────────────────────────────────────

  async function claimNow() {
    if (selectedKeys.size === 0) {
      alert('Select at least one POI first.');
      return;
    }
    setRunning(true);
    appendLog({poi: '— Claim cycle started —', ts: now(), status: 'ok', detail: `${selectedKeys.size} POIs queued`});
    await fetch('/api/claim_now', {method: 'POST'});
    // Reset countdown
    nextClaimAt = Date.now() + INTERVAL_S * 1000;
  }

  // ── STATUS POLLING ─────────────────────────────────────────────────────────

  async function pollStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      document.getElementById('stat-time').textContent    = d.server_time;
      document.getElementById('stat-daytime').textContent = d.daytime ? '☀ day' : '🌙 night';
    } catch {}
  }

  async function pollLog() {
    try {
      const r = await fetch('/api/log');
      const d = await r.json();
      renderLog(d.log);
    } catch {}
  }

  function renderLog(entries) {
    const el = document.getElementById('log-entries');
    if (!entries.length) {
      el.innerHTML = '<p class="empty-log">No activity yet.<br>Select POIs and click "Claim now".</p>';
      setRunning(false);
      return;
    }
    el.innerHTML = entries.map(e => {
      const statusClass = e.status;
      const detail = e.status === 'ok'
        ? `<span class="ok-text">✓ claimed</span> · img: ${e.img_source} · http ${e.http}`
        : e.status === 'warn'
        ? `<span class="warn-text">⚠ cached/warn</span> · http ${e.http}`
        : `<span class="error-text">✗ error: ${e.error || e.http}</span>`;
      return `
        <div class="log-entry ${statusClass}">
          <div class="log-entry-head">
            <span class="log-poi">${e.poi}</span>
            <span class="log-ts">${e.ts}</span>
          </div>
          <div class="log-detail">${detail}</div>
        </div>`;
    }).join('');

    // Check if still running (last entry is the cycle marker or a recent entry)
    const latest = entries[0];
    const recentMs = 30 * 1000;
    const isRecent = latest && latest.ts; // could parse ts but just keep running until next poll shows quiet
    setRunning(false); // caller sets it; just let the button re-enable after cycle
  }

  function appendLog(entry) {
    // Optimistic local append before server poll
    const el = document.getElementById('log-entries');
    if (el.querySelector('.empty-log')) el.innerHTML = '';
    const div = document.createElement('div');
    div.className = `log-entry ${entry.status}`;
    div.innerHTML = `
      <div class="log-entry-head">
        <span class="log-poi">${entry.poi}</span>
        <span class="log-ts">${entry.ts}</span>
      </div>
      <div class="log-detail">${entry.detail || ''}</div>`;
    el.prepend(div);
  }

  function setRunning(on) {
    running = on;
    document.getElementById('pulse-dot').classList.toggle('inactive', !on);
    document.getElementById('stat-status').textContent = on ? 'running' : 'idle';
    document.getElementById('claim-btn').disabled = on;
  }

  // ── COUNTDOWN ──────────────────────────────────────────────────────────────

  function tickCountdown() {
    if (!nextClaimAt) {
      // Compute from server interval
      fetch('/api/status').then(r => r.json()).then(d => {
        // next_run is HH:MM:SS today — parse it
        const parts = d.next_run.split(':').map(Number);
        if (parts.length === 3) {
          const now = new Date();
          const next = new Date();
          next.setHours(parts[0], parts[1], parts[2], 0);
          if (next <= now) next.setDate(next.getDate() + 1);
          nextClaimAt = next.getTime();
        }
      }).catch(() => {});
    }

    if (nextClaimAt) {
      const diff = Math.max(0, nextClaimAt - Date.now());
      const m    = Math.floor(diff / 60000);
      const s    = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      if (diff === 0) {
        nextClaimAt = Date.now() + INTERVAL_S * 1000;
        setRunning(true);
        appendLog({poi: '— Scheduled claim started —', ts: now(), status: 'ok', detail: `${selectedKeys.size} POIs queued`});
      }
    }
  }

  function now() {
    return new Date().toTimeString().slice(0,8);
  }

  // ── CLEAR LOG ──────────────────────────────────────────────────────────────

  function clearLog() {
    document.getElementById('log-entries').innerHTML =
      '<p class="empty-log">Log cleared.</p>';
  }

  // ── INIT ───────────────────────────────────────────────────────────────────

  (async function init() {
    // Load initial selection state from server
    const r = await fetch('/api/pois');
    const d = await r.json();
    d.pois.forEach(p => {
      if (p.selected) {
        selectedKeys.add(p.key);
        const card = document.querySelector(`.poi-card[data-key="${p.key}"]`);
        if (card) card.classList.add('selected');
      }
    });
    updateSelCount();

    // Kick off timers
    setInterval(tickCountdown, 1000);
    setInterval(pollLog,      3000);
    setInterval(pollStatus,   5000);
    pollStatus();
    pollLog();
  })();
</script>
</body>
</html>
